version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
      environmentVariables:
        - name: AUTH0_SECRET
          value: ${AUTH0_SECRET}
        - name: AUTH0_DOMAIN
          value: ${AUTH0_DOMAIN}
        - name: AUTH0_CLIENT_ID
          value: ${AUTH0_CLIENT_ID}
        - name: AUTH0_CLIENT_SECRET
          value: ${AUTH0_CLIENT_SECRET}
        - name: APP_BASE_URL
          value: ${APP_BASE_URL}
        - name: AUTH0_AUDIENCE
          value: ${AUTH0_AUDIENCE}
        - name: NEXT_PUBLIC_API_URL
          value: ${NEXT_PUBLIC_API_URL}
